name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build Aria.exe
        run: >
          pyinstaller
          --onefile
          --windowed
          --name Aria
          --collect-all sounddevice
          --collect-all winpty
          --hidden-import winreg
          aria_setup.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Aria ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/Aria.exe

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push API to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git clone https://shreyash616:${HF_TOKEN}@huggingface.co/spaces/shreyash616/aria-voice-api hf_space
          cp api/main.py api/requirements.txt api/Dockerfile api/README.md hf_space/
          cd hf_space
          git add -A
          git diff --cached --quiet || git commit -m "Release ${{ github.ref_name }}"
          git push
